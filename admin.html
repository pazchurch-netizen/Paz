<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Paz Church Belterra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#0047AB',
                        escuro: '#002E6E',
                        claro: '#F0F5FF',
                        branco: '#FFFFFF',
                        sucesso: '#16A34A',
                        alerta: '#F59E0B',
                        perigo: '#DC2626'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .sombra { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .botao { @apply bg-principal hover:bg-escuro text-branco px-4 py-2 rounded transition; }
        .botao-vermelho { @apply bg-red-600 hover:bg-red-700 text-branco px-3 py-1 rounded text-sm; }
        .botao-editar { @apply bg-yellow-500 hover:bg-yellow-600 text-branco px-3 py-1 rounded text-sm; }
        .botao-sucesso { @apply bg-sucesso hover:bg-green-700 text-branco px-3 py-1 rounded text-sm; }
        .logo { height: 36px; width: auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="telaLogin" class="max-w-sm mx-auto mt-20 bg-branco p-6 rounded-lg sombra text-center">
    <img src="logo.png" alt="Paz Church Belterra" class="h-16 w-auto mx-auto mb-4">
    <h2 class="text-xl font-bold text-principal mb-4">Acesso ao Painel</h2>
    <input type="password" id="senhaAdmin" placeholder="Digite a senha" class="w-full border rounded p-2 mb-3" required>
    <button onclick="verificarSenha()" class="botao w-full">Entrar</button>
    <p class="text-xs text-center mt-3 text-gray-500">Senha padrão: paz2026</p>
</div>

<div id="painelPrincipal" class="hidden container mx-auto p-4 mt-6">
    <header class="bg-principal text-branco p-4 rounded-lg flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Paz Church Belterra" class="logo bg-branco p-1 rounded">
            <h1 class="text-xl font-bold">Painel de Gerenciamento</h1>
        </div>
        <div>
            <a href="index.html" class="text-sm underline mr-4">Ver Site</a>
            <button onclick="sair()" class="text-sm underline">Sair</button>
        </div>
    </header>

    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <!-- Configuração de Inscrições e Lotes -->
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Configuração de Inscrições</h3>
            <form id="formInscricaoConfig" class="space-y-3">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="inscricaoAtiva">
                    <span>Ativar inscrições no site</span>
                </label>
                <input type="text" id="inscricaoTitulo" placeholder="Nome do evento" class="w-full border rounded p-2">
                <textarea id="inscricaoDesc" placeholder="Descrição do evento" rows="2" class="w-full border rounded p-2"></textarea>
                
                <h4 class="font-semibold mt-3 text-principal">Dados do PIX</h4>
                <input type="text" id="pixChave" placeholder="Chave PIX" class="w-full border rounded p-2">
                <textarea id="pixCopiaCola" placeholder="Código PIX Copia e Cola" rows="2" class="w-full border rounded p-2"></textarea>

                <h4 class="font-semibold mt-3 text-principal">Lotes de Ingresso</h4>
                <div id="lotesContainer"></div>
                <button type="button" onclick="adicionarLote()" class="botao-secundario w-full text-center">+ Adicionar Lote</button>

                <button type="submit" class="botao w-full mt-4">Salvar Configuração</button>
            </form>
        </div>

        <!-- Dados do Site e Outros Cadastros -->
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Dados do Site</h3>
            <form id="formConfigSite" class="space-y-3">
                <input type="text" id="confEndereco" placeholder="Endereço" class="w-full border rounded p-2" required>
                <input type="text" id="confCidade" placeholder="Cidade/UF" class="w-full border rounded p-2" required>
                <input type="text" id="confCep" placeholder="CEP" class="w-full border rounded p-2" required>
                <input type="text" id="confTelefone" placeholder="Telefone" class="w-full border rounded p-2" required>
                <input type="url" id="confInstagram" placeholder="Link Instagram" class="w-full border rounded p-2">
                <input type="url" id="confYoutube" placeholder="Link YouTube" class="w-full border rounded p-2">
                <button type="submit" class="botao w-full">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <!-- Lista de Inscritos -->
    <div class="bg-branco p-5 rounded-lg sombra mb-8">
        <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Inscritos no Evento</h3>
        <div id="listaInscritos"></div>
    </div>

    <!-- Outras seções de gerenciamento mantidas -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Células Cadastradas</h3>
            <div id="listaCelulasAdmin"></div>
        </div>
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Mensagens Recebidas</h3>
            <div id="listaMensagens"></div>
        </div>
    </div>
</div>

<script>
const SENHA_CORRETA = "paz2026";
let contadorLotes = 0;

function verificarSenha() {
    const senha = document.getElementById('senhaAdmin').value.trim();
    if (senha === SENHA_CORRETA) {
        document.getElementById('telaLogin').classList.add('hidden');
        document.getElementById('painelPrincipal').classList.remove('hidden');
        carregarDadosAdmin();
    } else alert('Senha incorreta!');
}

function sair() {
    document.getElementById('painelPrincipal').classList.add('hidden');
    document.getElementById('telaLogin').classList.remove('hidden');
    document.getElementById('senhaAdmin').value = '';
}

function adicionarLote(dados = {}) {
    contadorLotes++;
    const container = document.getElementById('lotesContainer');
    const div = document.createElement('div');
    div.className = 'p-3 border rounded mb-3 bg-gray-50';
    div.innerHTML = `
        <h5 class="font-medium mb-2">Lote ${contadorLotes}</h5>
        <input type="text" placeholder="Nome do lote" class="w-full border rounded p-2 mb-2 lote-nome" value="${dados.nome || ''}">
        <input type="number" step="0.01" placeholder="Valor R$" class="w-full border rounded p-2 mb-2 lote-valor" value="${dados.valor || ''}">
        <input type="number" placeholder="Quantidade total" class="w-full border rounded p-2 mb-2 lote-quantidade" value="${dados.quantidade || ''}">
        <input type="datetime-local" placeholder="Data de término" class="w-full border rounded p-2 mb-2 lote-data" value="${dados.dataFim || ''}">
        <input type="hidden" class="lote-vendidos" value="${dados.vendidos || 0}">
        <button type="button" onclick="removerLote(this)" class="text-red-600 text-sm">Remover lote</button>
    `;
    container.appendChild(div);
}

function removerLote(botao) {
    botao.parentElement.remove();
}

function carregarDadosAdmin() {
    // Configurações do site
    const conf = JSON.parse(localStorage.getItem('configSite')) || {
        endereco: "Estrada UM, S/N", cidade: "Belterra - PA", cep: "68143-000", telefone: "(93) 99999-0000"
    };
    document.getElementById('confEndereco').value = conf.endereco;
    document.getElementById('confCidade').value = conf.cidade;
    document.getElementById('confCep').value = conf.cep;
    document.getElementById('confTelefone').value = conf.telefone;
    document.getElementById('confInstagram').value = conf.instagram || '';
    document.getElementById('confYoutube').value = conf.youtube || '';

    // Configuração de inscrições
    const confIns = JSON.parse(localStorage.getItem('configInscricao')) || { ativo: false, lotes: [] };
    document.getElementById('inscricaoAtiva').checked = confIns.ativo;
    document.getElementById('inscricaoTitulo').value = confIns.titulo || '';
    document.getElementById('inscricaoDesc').value = confIns.descricao || '';
    document.getElementById('pixChave').value = confIns.pixChave || '';
    document.getElementById('pixCopiaCola').value = confIns.pixCopiaCola || '';

    document.getElementById('lotesContainer').innerHTML = '';
    contadorLotes = 0;
    confIns.lotes.forEach(lote => adicionarLote(lote));

    // Lista de inscritos
    const inscritos = JSON.parse(localStorage.getItem('inscritos')) || [];
    document.getElementById('listaInscritos').innerHTML = inscritos.length ?
        inscritos.map(i => `
            <div class="border-b pb-4 mb-4">
                <p><strong>Nome:</strong> ${i.nome}</p>
                <p><strong>CPF:</strong> ${i.cpf} | <strong>Nascimento:</strong> ${i.nascimento}</p>
                <p><strong>WhatsApp:</strong> ${i.whatsapp} | <strong>Lote:</strong> ${i.lote} | <strong>Valor:</strong> R$ ${i.valor.toFixed(2).replace('.', ',')}</p>
                <p><strong>Status:</strong> <span class="font-semibold ${i.status === 'Confirmado' ? 'text-sucesso' : 'text-alerta'}">${i.status}</span></p>
                <p><strong>Data:</strong> ${i.data}</p>
                <div class="flex gap-2 mt-2">
                    <button onclick="verComprovante('${i.comprovante}')" class="botao text-sm">Ver Comprovante</button>
                    <button onclick="alterarStatus(${i.id}, 'Confirmado')" class="botao-sucesso text-sm">Confirmar Pagamento</button>
                    <button onclick="alterarStatus(${i.id}, 'Recusado')" class="botao-vermelho text-sm">Recusar</button>
                </div>
            </div>
        `).join('') : '<p class="text-gray-500 text-center py-4">Nenhuma inscrição recebida.</p>';
}

function verComprovante(url) {
    const novaJanela = window.open();
    novaJanela.document.write(`<img src="${url}" style="max-width:100%;height:auto;">`);
}

function alterarStatus(id, novoStatus) {
    const lista = JSON.parse(localStorage.getItem('inscritos')) || [];
    const novaLista = lista.map(i => i.id === id ? { ...i, status: novoStatus } : i);
    localStorage.setItem('inscritos', JSON.stringify(novaLista));
    carregarDadosAdmin();
}

// Salvar configurações
document.getElementById('formInscricaoConfig').addEventListener('submit', e => {
    e.preventDefault();
    const lotes = [];
    document.querySelectorAll('#lotesContainer > div').forEach(div => {
        lotes.push({
            nome: div.querySelector('.lote-nome').value,
            valor: parseFloat(div.querySelector('.lote-valor').value),
            quantidade: parseInt(div.querySelector('.lote-quantidade').value),
            dataFim: div.querySelector('.lote-data').value,
            vendidos: parseInt(div.querySelector('.lote-vendidos').value) || 0
        });
    });

    const dados = {
        ativo: document.getElementById('inscricaoAtiva').checked,
        titulo: document.getElementById('inscricaoTitulo').value,
        descricao: document.getElementById('inscricaoDesc').value,
        pixChave: document.getElementById('pixChave').value,
        pixCopiaCola: document.getElementById('pixCopiaCola').value,
        lotes: lotes
    };
    localStorage.setItem('configInscricao', JSON.stringify(dados));
    alert('Configuração salva com sucesso!');
});

document.getElementById('formConfigSite').addEventListener('submit', e => {
    e.preventDefault();
    const dados = {
        endereco: document.getElementById('confEndereco').value,
        cidade: document.getElementById('confCidade').value,
        cep: document.getElementById('confCep').value,
        telefone: document.getElementById('confTelefone').value,
        instagram: document.getElementById('confInstagram').value,
        youtube: document.getElementById('confYoutube').value
    };
    localStorage.setItem('configSite', JSON.stringify(dados));
    alert('Dados do site salvos!');
});
</script>
</body>
</html>

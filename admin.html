<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Paz Church Belterra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#0047AB',
                        escuro: '#002E6E',
                        claro: '#F0F5FF',
                        branco: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .sombra { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .botao { @apply bg-principal hover:bg-escuro text-branco px-4 py-2 rounded transition; }
        .botao-vermelho { @apply bg-red-600 hover:bg-red-700 text-branco px-3 py-1 rounded text-sm; }
        .botao-editar { @apply bg-yellow-500 hover:bg-yellow-600 text-branco px-3 py-1 rounded text-sm; }
        .logo { height: 36px; width: auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="telaLogin" class="max-w-sm mx-auto mt-20 bg-branco p-6 rounded-lg sombra text-center">
    <img src="logo.png" alt="Paz Church Belterra" class="h-16 w-auto mx-auto mb-4">
    <h2 class="text-xl font-bold text-principal mb-4">Acesso ao Painel</h2>
    <input type="password" id="senhaAdmin" placeholder="Digite a senha" class="w-full border rounded p-2 mb-3" required>
    <button onclick="verificarSenha()" class="botao w-full">Entrar</button>
    <p class="text-xs text-center mt-3 text-gray-500">Senha padrão: paz2026</p>
</div>

<div id="painelPrincipal" class="hidden container mx-auto p-4 mt-6">
    <header class="bg-principal text-branco p-4 rounded-lg flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Paz Church Belterra" class="logo bg-branco p-1 rounded">
            <h1 class="text-xl font-bold">Painel de Gerenciamento</h1>
        </div>
        <div>
            <a href="index.html" class="text-sm underline mr-4">Ver Site</a>
            <button onclick="sair()" class="text-sm underline">Sair</button>
        </div>
    </header>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Editar Dados do Site</h3>
            <form id="formConfigSite" class="space-y-3">
                <input type="text" id="confEndereco" placeholder="Endereço" class="w-full border rounded p-2" required>
                <input type="text" id="confCidade" placeholder="Cidade/UF" class="w-full border rounded p-2" required>
                <input type="text" id="confCep" placeholder="CEP" class="w-full border rounded p-2" required>
                <input type="text" id="confTelefone" placeholder="Telefone" class="w-full border rounded p-2" required>
                <input type="url" id="confInstagram" placeholder="Link Instagram" class="w-full border rounded p-2">
                <input type="url" id="confYoutube" placeholder="Link YouTube" class="w-full border rounded p-2">
                <button type="submit" class="botao w-full">Salvar Alterações</button>
            </form>
        </div>

        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Gerenciar Inscrições</h3>
            <form id="formInscricaoConfig" class="space-y-3">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="inscricaoAtiva">
                    <span>Ativar inscrições</span>
                </label>
                <input type="text" id="inscricaoTitulo" placeholder="Nome do evento" class="w-full border rounded p-2">
                <textarea id="inscricaoDesc" placeholder="Descrição do evento" rows="2" class="w-full border rounded p-2"></textarea>
                <input type="text" id="inscricaoValor" placeholder="Valor (ex: R$ 50,00 ou Gratuito)" class="w-full border rounded p-2">
                <input type="datetime-local" id="inscricaoData" class="w-full border rounded p-2">
                <button type="submit" class="botao w-full">Salvar Configuração</button>
            </form>
        </div>

        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Cadastrar Notícia</h3>
            <form id="formNoticia" class="space-y-3">
                <input type="text" placeholder="Título" id="tituloNoticia" class="w-full border rounded p-2" required>
                <input type="date" id="dataNoticia" class="w-full border rounded p-2" required>
                <input type="file" accept="image/*" id="imgNoticia" class="w-full text-sm">
                <textarea rows="3" placeholder="Conteúdo" id="conteudoNoticia" class="w-full border rounded p-2" required></textarea>
                <button type="submit" class="botao w-full">Salvar Notícia</button>
            </form>
        </div>

        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Cadastrar Evento</h3>
            <form id="formEvento" class="space-y-3">
                <input type="text" placeholder="Nome do Evento" id="nomeEvento" class="w-full border rounded p-2" required>
                <input type="date" id="dataEvento" class="w-full border rounded p-2" required>
                <input type="time" id="horaEvento" class="w-full border rounded p-2" required>
                <input type="text" placeholder="Local" id="localEvento" class="w-full border rounded p-2" required>
                <input type="file" accept="image/*" id="imgEvento" class="w-full text-sm">
                <textarea rows="2" placeholder="Descrição" id="descEvento" class="w-full border rounded p-2"></textarea>
                <button type="submit" class="botao w-full">Salvar Evento</button>
            </form>
        </div>

        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Cadastrar Célula</h3>
            <form id="formCelula" class="space-y-3">
                <input type="text" placeholder="Nome da Célula" id="nomeCelula" class="w-full border rounded p-2" required>
                <input type="text" placeholder="Bairro" id="bairroCelula" class="w-full border rounded p-2" required>
                <input type="text" placeholder="Endereço completo" id="enderecoCelula" class="w-full border rounded p-2" required>
                <input type="text" placeholder="Responsável" id="respCelula" class="w-full border rounded p-2" required>
                <input type="text" placeholder="Dia da Semana" id="diaCelula" class="w-full border rounded p-2" required>
                <input type="time" id="horaCelula" class="w-full border rounded p-2" required>
                <input type="tel" placeholder="Contato" id="contatoCelula" class="w-full border rounded p-2" required>
                <button type="submit" class="botao w-full">Salvar Célula</button>
            </form>
        </div>

        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Adicionar Vídeo</h3>
            <form id="formVideo" class="space-y-3">
                <input type="text" placeholder="Título do vídeo" id="tituloVideo" class="w-full border rounded p-2" required>
                <select id="tipoVideo" class="w-full border rounded p-2">
                    <option value="youtube">Link do YouTube</option>
                    <option value="arquivo">Arquivo próprio</option>
                </select>
                <div id="campoLink">
                    <input type="url" placeholder="Link do YouTube" id="linkVideo" class="w-full border rounded p-2">
                </div>
                <div id="campoArquivo" class="hidden">
                    <input type="file" accept="video/*" id="arquivoVideo" class="w-full text-sm">
                </div>
                <button type="submit" class="botao w-full">Salvar Vídeo</button>
            </form>
        </div>
    </div>

    <!-- Listas de Gerenciamento -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Mensagens Recebidas</h3>
            <div id="listaMensagens"></div>
        </div>
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Inscritos no Evento</h3>
            <div id="listaInscritos"></div>
        </div>
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Células Cadastradas</h3>
            <div id="listaCelulasAdmin"></div>
        </div>
        <div class="bg-branco p-5 rounded-lg sombra">
            <h3 class="text-lg font-semibold text-principal mb-4 border-b pb-2">Vídeos Cadastrados</h3>
            <div id="listaVideosAdmin"></div>
        </div>
    </div>
</div>

<!-- Modal Editar Célula -->
<div id="modalEditarCelula" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
    <div class="bg-branco p-6 rounded-lg w-full max-w-md">
        <h3 class="text-xl font-bold text-principal mb-4">Editar Célula</h3>
        <form id="formEditarCelula" class="space-y-3">
            <input type="hidden" id="editarId">
            <input type="text" id="editarNome" class="w-full border rounded p-2" required>
            <input type="text" id="editarBairro" class="w-full border rounded p-2" required>
            <input type="text" id="editarEndereco" class="w-full border rounded p-2" required>
            <input type="text" id="editarResp" class="w-full border rounded p-2" required>
            <input type="text" id="editarDia" class="w-full border rounded p-2" required>
            <input type="time" id="editarHora" class="w-full border rounded p-2" required>
            <input type="tel" id="editarContato" class="w-full border rounded p-2" required>
            <div class="flex gap-2 mt-4">
                <button type="submit" class="botao flex-1">Salvar Alterações</button>
                <button type="button" onclick="fecharModalEditar()" class="border border-gray-300 rounded p-2 flex-1">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
const SENHA_CORRETA = "paz2026";
let celulaEditando = null;

function verificarSenha() {
    const senha = document.getElementById('senhaAdmin').value;
    if (senha === SENHA_CORRETA) {
        document.getElementById('telaLogin').classList.add('hidden');
        document.getElementById('painelPrincipal').classList.remove('hidden');
        carregarDadosAdmin();
    } else alert('Senha incorreta!');
}
function sair() {
    document.getElementById('painelPrincipal').classList.add('hidden');
    document.getElementById('telaLogin').classList.remove('hidden');
    document.getElementById('senhaAdmin').value = '';
}
function lerImagem(arquivo, callback) {
    const leitor = new FileReader();
    leitor.onload = e => callback(e.target.result);
    leitor.readAsDataURL(arquivo);
}
function abrirModalEditar(celula) {
    celulaEditando = celula;
    document.getElementById('editarId').value = celula.id;
    document.getElementById('editarNome').value = celula.nome;
    document.getElementById('editarBairro').value = celula.bairro;
    document.getElementById('editarEndereco').value = celula.endereco;
    document.getElementById('editarResp').value = celula.responsavel;
    document.getElementById('editarDia').value = celula.dia;
    document.getElementById('editarHora').value = celula.horario;
    document.getElementById('editarContato').value = celula.contato;
    document.getElementById('modalEditarCelula').classList.remove('hidden');
}
function fecharModalEditar() {
    document.getElementById('modalEditarCelula').classList.add('hidden');
    celulaEditando = null;
}
function apagarItem(chave, id) {
    const lista = JSON.parse(localStorage.getItem(chave)) || [];
    const nova = lista.filter(i => i.id !== id);
    localStorage.setItem(chave, JSON.stringify(nova));
    carregarDadosAdmin();
    alert('Removido com sucesso!');
}

function carregarDadosAdmin() {
    const conf = JSON.parse(localStorage.getItem('configSite')) || {};
    document.getElementById('confEndereco').value = conf.endereco || '';
    document.getElementById('confCidade').value = conf.cidade || '';
    document.getElementById('confCep').value = conf.cep || '';
    document.getElementById('confTelefone').value = conf.telefone || '';
    document.getElementById('confInstagram').value = conf.instagram || '';
    document.getElementById('confYoutube').value = conf.youtube || '';

    const confIns = JSON.parse(localStorage.getItem('configInscricao')) || {};
    document.getElementById('inscricaoAtiva').checked = confIns.ativo || false;
    document.getElementById('inscricaoTitulo').value = confIns.titulo || '';
    document.getElementById('inscricaoDesc').value = confIns.descricao || '';
    document.getElementById('inscricaoValor').value = confIns.valor || '';
    document.getElementById('inscricaoData').value = confIns.dataLimite || '';

    const mensagens = JSON.parse(localStorage.getItem('mensagensRecebidas')) || [];
    document.getElementById('listaMensagens').innerHTML = mensagens.length ?
        mensagens.map(m => `
            <div class="border-b pb-3 mb-3">
                <p><strong>Nome:</strong> ${m.nome}</p>
                <p><strong>Contato:</strong> ${m.email} | ${m.telefone || '-'}</p>
                <p><strong>Data:</strong> ${m.data}</p>
                <p><strong>Mensagem:</strong> ${m.texto}</p>
                <button onclick="apagarItem('mensagensRecebidas', ${m.id})" class="botao-vermelho mt-2">Apagar</button>
            </div>
        `).join('') : '<p
